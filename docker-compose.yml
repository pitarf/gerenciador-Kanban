version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alertops-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neondb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/neondb?sslmode=disable
      - JWT_SECRET=development-secret
      - INTERNAL_SYNC_TOKEN=sync-token-123
    depends_on:
      - db

volumes:
  postgres_data:
